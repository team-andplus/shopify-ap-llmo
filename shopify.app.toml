# Learn more: https://shopify.dev/docs/apps/tools/cli/configuration
# 初回: Shopify Partners でアプリを作成し、client_id を取得して差し替える

client_id = "60ffdc8e1653f4c1fc19d326259a218c"
name = "AP LLMO"
application_url = "https://apps.andplus.tech/andplus-apps/shopify-ap-llmo/"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

[access_scopes]
# stagedUploadsCreate は read_files + write_files の両方が必要
# app_proxy で llms.txt 等をストア URL からリダイレクトするために必要
scopes = "read_products,read_files,write_files,write_app_proxy,read_locations,read_online_store_navigation,write_online_store_navigation"
optional_scopes = [ ]
use_legacy_install_flow = false

[app_proxy]
url = "https://apps.andplus.tech/andplus-apps/shopify-ap-llmo/app-proxy"
prefix = "apps"
subpath = "llmo"

[auth]
redirect_urls = [
  "https://apps.andplus.tech/andplus-apps/shopify-ap-llmo/auth"
]
